name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm ci runs `prepare`, which also builds the package (tsc → dist/).
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck -w demo
      - run: npm test
      - run: npm run demo:build
